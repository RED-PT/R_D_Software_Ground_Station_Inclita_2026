<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RED-PT Ground Station</title>
    <style>
        /* --- 1. BASE CYBERDECK THEME --- */
        body {
            background-color: #0a0a0a;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .dashboard {
            border: 1px solid #333;
            padding: 30px;
            width: 80%;
            max-width: 800px;
            text-align: center;
            background: #111;
            box-shadow: 0 0 15px rgba(0, 255, 0, 0.1);
        }

        /* --- 2. MAIN DASHBOARD BUTTON --- */
        .btn-danger {
            background: #ff0000;
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            border-radius: 4px;
            transition: background 0.3s;
        }
        .btn-danger:hover { background: #cc0000; }

        /* --- 3. MODAL CSS (THE WARNING POPUP) --- */
        .hidden { 
            display: none !important; 
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(0, 0, 0, 0.85);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
        }

        .modal-box {
            background-color: #1a0000;
            border: 2px solid #ff0000;
            padding: 30px;
            width: 400px;
            text-align: center;
            color: #ff4d4d;
            box-shadow: 0 0 20px #ff0000;
        }

        .modal-actions {
            margin-top: 25px;
            display: flex;
            justify-content: space-around;
        }

        /* Modal Buttons */
        .btn-safe { background: #333; color: white; border: 1px solid #777; padding: 10px 20px; cursor: pointer; }
        .btn-safe:hover { background: #444; }
        
        .btn-fatal { background: transparent; color: #ff0000; border: 2px solid #ff0000; padding: 10px 20px; font-weight: bold; cursor: pointer; }
        .btn-fatal:hover { background: #ff0000; color: white; }

        .blinking-text { animation: blinker 1s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div class="dashboard">
        <h1>🚀 RED-PT MISSION CONTROL</h1>
        <p>Telemetry Link: <span id="connection-status" style="color: yellow;">Connecting...</span></p>
        
        <button id="initiate-abort-btn" class="btn-danger">INITIATE ABORT</button>
    </div>

    <div id="abort-modal" class="modal-overlay hidden">
        <div class="modal-box glass-panel">
            <h2 class="blinking-text">CRITICAL WARNING</h2>
            <p>You are about to send the ABORT command. This will sever the connection and deploy recovery systems immediately.</p>
            <p>This action <strong>CANNOT</strong> be undone.</p>
            
            <div class="modal-actions">
                <button id="cancel-abort-btn" class="btn-safe">CANCEL</button>
                <button id="confirm-abort-btn" class="btn-fatal">CONFIRM ABORT</button>
            </div>
        </div>
    </div>

    <script>
        // 1. Establish WebSocket connection to the Rust backend
        const socket = new WebSocket("ws://" + window.location.host + "/ws");
        const statusText = document.getElementById("connection-status");

        // Listen for connection success
        socket.onopen = () => {
            console.log("🟢 Connected to Ground Station Server");
            statusText.innerText = "ONLINE";
            statusText.style.color = "#00ff00";
        };

        // Listen for connection loss
        socket.onclose = () => {
            console.warn("🔴 Disconnected from Ground Station Server");
            statusText.innerText = "OFFLINE";
            statusText.style.color = "#ff0000";
        };

        // 2. Wait for HTML to load before attaching UI listeners
        document.addEventListener("DOMContentLoaded", () => {
            
            // Map our HTML elements to JavaScript variables
            const initiateBtn = document.getElementById("initiate-abort-btn");
            const modal = document.getElementById("abort-modal");
            const cancelBtn = document.getElementById("cancel-abort-btn");
            const confirmBtn = document.getElementById("confirm-abort-btn");

            // User clicks "INITIATE ABORT" -> Show Modal
            initiateBtn.addEventListener("click", () => {
                modal.classList.remove("hidden");
            });

            // User clicks "CANCEL" -> Hide Modal
            cancelBtn.addEventListener("click", () => {
                modal.classList.add("hidden");
            });

            // User clicks "CONFIRM ABORT" -> Send Command
            confirmBtn.addEventListener("click", () => {
                modal.classList.add("hidden"); // Hide modal
                
                // Visually lock the dashboard button
                initiateBtn.innerText = "ABORT SENT";
                initiateBtn.disabled = true;
                initiateBtn.style.background = "#550000";

                console.warn("ABORT COMMAND DISPATCHED TO ROCKET!");
                
                // Safely send the command to Rust
                if (socket.readyState === WebSocket.OPEN) {
                    socket.send("ABORT"); 
                } else {
                    console.error("Failed to send ABORT: WebSocket is not open!");
                    alert("CRITICAL ERROR: Connection lost. Cannot send ABORT.");
                }
            });
        });
    </script>
</body>
</html>
