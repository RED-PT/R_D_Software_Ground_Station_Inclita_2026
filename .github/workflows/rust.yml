name: Rust CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  CARGO_TERM_COLOR: always

jobs:
  build_and_test:
    name: Build and Test (x86_64)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust 
      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build project
        run: cargo build --verbose

      - name: Run tests
        run: cargo test --verbose

  build_pi:
    name: Build for Raspberry Pi (aarch64)
    needs: build_and_test # Only runs if the job above passes
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-unknown-linux-gnu

      - name: Cache Cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install 'cross'
        uses: taiki-e/install-action@cross

      - name: Cross-compile for Raspberry Pi (64-bit)
        run: cross build --release --target aarch64-unknown-linux-gnu

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4
        with:
          name: groundstation-pi-
          path: target/aarch64-unknown-linux-gnu/release/GroundStation_Inclita
